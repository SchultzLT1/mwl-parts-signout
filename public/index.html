<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWL Parts Sign-Out</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#e8440a;--orange-light:#fff3ee;
  --charcoal:#1e1e1e;--ash:#f7f6f3;--ash-dark:#eeecea;
  --border:#e0dbd4;--white:#fff;--muted:#888;--text:#1e1e1e;
  --red:#c0392b;--red-light:#fdf1f0;--green:#2e7d52;--green-light:#edf7f2;
}
body{font-family:'DM Sans',sans-serif;background:var(--ash);color:var(--text);min-height:100vh}
.header{background:var(--white);border-bottom:2px solid var(--border);padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:12px}
.hdiv{width:1px;height:30px;background:var(--border);margin:0 6px}
.htitle{font-size:15px;font-weight:600;color:var(--charcoal)}
.clock{font-size:13px;color:var(--muted);background:var(--ash);border:1px solid var(--border);border-radius:8px;padding:7px 16px}
.tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex}
.tab{padding:14px 24px;font-size:14px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab:hover{color:var(--charcoal)}
.tab.active{color:var(--charcoal);border-bottom-color:var(--charcoal)}
.tab.active.ret{color:var(--red);border-bottom-color:var(--red)}
.main{max-width:820px;margin:0 auto;padding:28px 20px 80px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:20px}
.clabel{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:14px;font-weight:500}
.req{color:var(--orange);margin-left:2px}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px}
select,input[type=text],input[type=number]{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);outline:none;appearance:none;transition:border-color .15s}
select{padding-right:36px;cursor:pointer}
select:focus,input:focus{border-color:var(--orange)}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-row input{flex:1}
.add-btn{padding:11px 18px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:500;color:var(--charcoal);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.add-btn:hover{background:var(--charcoal);color:var(--white);border-color:var(--charcoal)}
.add-btn:disabled{background:var(--ash);color:var(--muted);cursor:not-allowed}
.ph{display:grid;grid-template-columns:40px 1fr 76px 96px;gap:12px;padding:0 2px 10px;border-bottom:1px solid var(--ash-dark);margin-bottom:12px}
.ph span{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.ph .c{text-align:center}
.prow{display:grid;grid-template-columns:40px 1fr 76px 96px;gap:12px;align-items:start;margin-bottom:9px}
.pnum{display:flex;align-items:center;justify-content:center;height:44px;font-size:13px;font-weight:500;color:#ccc}
.ac{position:relative}
.ac-x{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;line-height:1;display:none}
.ac.has-val .ac-x{display:block;color:var(--muted)}
.ac.has-val .ac-x:hover{color:var(--charcoal)}
.dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.1);z-index:200;max-height:220px;overflow-y:auto;display:none}
.ddi{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--ash)}
.ddi:last-child{border-bottom:none}
.ddi:hover,.ddi.hi{background:var(--orange-light)}
.ddi-pn{font-size:13px;font-weight:600}
.ddi-desc{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-none{padding:12px 14px;font-size:13px;color:var(--muted);text-align:center}
input[type=number]{text-align:center}
.roc{display:flex;align-items:center;justify-content:center;height:44px;gap:7px}
.roc input[type=checkbox]{width:17px;height:17px;accent-color:var(--orange);cursor:pointer}
.roc label{font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
.sbar{display:flex;align-items:center;justify-content:space-between;padding-top:4px}
.snote{font-size:13px;color:var(--muted)}
.sbtn{padding:14px 44px;background:var(--charcoal);color:var(--white);border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;min-width:200px}
.sbtn:hover{background:#333}
.sbtn:disabled{background:var(--muted);cursor:not-allowed}
.sbtn.ret{background:var(--red)}
.sbtn.ret:hover{background:#a93226}
#success{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.okc{width:80px;height:80px;border-radius:50%;background:var(--green-light);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:36px;color:var(--green)}
#success h2{font-size:26px;font-weight:600;margin-bottom:10px}
#success p{font-size:16px;color:var(--muted);margin-bottom:32px;line-height:1.6}
.nbtn{padding:13px 36px;background:var(--charcoal);color:var(--white);border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.nbtn:hover{background:#333}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--charcoal);color:var(--white);padding:13px 28px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.row2{grid-template-columns:1fr}.header,.tabs{padding:0 16px}.main,.card{padding:16px}}
</style>
</head>

<script>
const SB='https://pgkqtmlbhpdbbjelfpdz.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBna3F0bWxiaHBkYmJqZWxmcGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDIwOTMsImV4cCI6MjA5MjMxODA5M30.6sjCWIoBCPU3n3lylk5EUAvMDkqdwXU-_kBH5-6-DF8';
let mode='sign-out',pCache={},timers={};

function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});}
tick();setInterval(tick,1000);

async function db(path,opts={}){
  const r=await fetch(SB+path,{...opts,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  const t=await r.text();
  if(!r.ok)throw new Error(t||r.status);
  return t?JSON.parse(t):null;
}

async function init(){
  buildRows();
  await Promise.all([loadEmp(),loadJobs()]);
}

async function loadEmp(){
  const s=document.getElementById('emp-sel');
  try{
    const rows=await db('/rest/v1/parts_employees?active=eq.true&order=name');
    s.innerHTML='<option value="">Select employee…</option>';
    (rows||[]).forEach(r=>{const o=new Option(r.name,r.name);s.appendChild(o);});
  }catch(e){s.innerHTML='<option value="">⚠ Could not load</option>';toast('Failed to load employees','err');}
}

async function loadJobs(){
  const s=document.getElementById('job-sel');
  try{
    const rows=await db('/rest/v1/parts_jobs?active=eq.true&order=job_label');
    s.innerHTML='<option value="">Select job…</option>';
    (rows||[]).forEach(r=>{const o=new Option(r.job_label,r.job_label);s.appendChild(o);});
  }catch(e){s.innerHTML='<option value="">⚠ Could not load</option>';toast('Failed to load jobs','err');}
}

async function addJob(){
  const inp=document.getElementById('new-job');
  const v=inp.value.trim();
  if(!v){toast('Enter a job label','err');return;}
  const m=v.match(/^(\d+)\s*-\s*(.+)$/);
  if(!m){toast('Format: 12345 - LastName','err');return;}
  const btn=document.getElementById('add-btn');
  btn.disabled=true;btn.textContent='Adding…';
  try{
    await db('/rest/v1/parts_jobs',{method:'POST',body:JSON.stringify({job_label:v,invoice_number:m[1],last_name:m[2].trim()}),headers:{'Prefer':'return=minimal'}});
    inp.value='';
    toast('Job added: '+v,'ok');
    await loadJobs();
    document.getElementById('job-sel').value=v;
  }catch(e){toast('Failed to add job: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='+ Add Job';}
}

async function addEmp(){
  const inp=document.getElementById('new-emp');
  const v=inp.value.trim();
  if(!v){toast('Enter a name','err');return;}
  const btn=document.getElementById('add-emp-btn');
  btn.disabled=true;btn.textContent='Adding…';
  try{
    await db('/rest/v1/parts_employees',{method:'POST',body:JSON.stringify({name:v,active:true}),headers:{'Prefer':'return=minimal'}});
    inp.value='';
    toast(v+' added','ok');
    await loadEmp();
    document.getElementById('emp-sel').value=v;
  }catch(e){toast('Failed: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='+ Add';}
}

function buildRows(){
  const c=document.getElementById('prows');
  c.innerHTML='';pCache={};
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='prow';
    d.innerHTML=`
      <div class="pnum">${i}</div>
      <div class="ac" id="ac${i}">
        <input type="text" id="pn${i}" placeholder="Type part #…" autocomplete="off"
          oninput="onPn(${i})" onblur="blurPn(${i})" onkeydown="keyPn(event,${i})"/>
        <button class="ac-x" tabindex="-1" onmousedown="clearRow(${i})">×</button>
        <div class="dd" id="dd${i}"></div>
      </div>
      <input type="number" id="qty${i}" placeholder="0" min="1"/>
      <div class="roc"><input type="checkbox" id="ro${i}"/><label for="ro${i}">Low</label></div>`;
    c.appendChild(d);
  }
}

function clearRow(i){
  document.getElementById('pn'+i).value='';
  document.getElementById('qty'+i).value='';
  document.getElementById('ro'+i).checked=false;
  document.getElementById('ac'+i).classList.remove('has-val');
  delete pCache['p'+i];closeDD(i);
}

async function onPn(i){
  const v=document.getElementById('pn'+i).value.trim();
  document.getElementById('ac'+i).classList.toggle('has-val',v.length>0);
  clearTimeout(timers[i]);
  if(v.length<2){closeDD(i);return;}
  timers[i]=setTimeout(async()=>{
    try{
      const rows=await db(`/rest/v1/pc_parts?item_name=ilike.*${encodeURIComponent(v)}*&active_status=eq.Active&select=item_name,description,cost&limit=12`);
      renderDD(i,rows||[]);
    }catch{closeDD(i);}
  },220);
}

function renderDD(i,items){
  const dd=document.getElementById('dd'+i);
  if(!items.length){dd.innerHTML='<div class="dd-none">No matching parts</div>';}
  else{
    dd.innerHTML=items.map((r,x)=>{
      const pn=(r.item_name||'').replace(/'/g,"\\'");
      const desc=(r.description||'').substring(0,60).replace(/'/g,"\\'");
      return `<div class="ddi${x===0?' hi':''}" onmousedown="pick(${i},'${pn}','${desc}',${r.cost||0})">
        <div class="ddi-pn">${r.item_name}</div>${desc?`<div class="ddi-desc">${desc}</div>`:''}
      </div>`;
    }).join('');
  }
  dd.style.display='block';
}

function pick(i,pn,desc,cost){
  document.getElementById('pn'+i).value=pn;
  document.getElementById('ac'+i).classList.add('has-val');
  pCache['p'+i]={pn,desc,cost};
  closeDD(i);
  document.getElementById('qty'+i).focus();
}

function blurPn(i){setTimeout(()=>closeDD(i),200);}
function closeDD(i){const d=document.getElementById('dd'+i);if(d)d.style.display='none';}

function keyPn(e,i){
  const dd=document.getElementById('dd'+i);
  if(dd.style.display==='none')return;
  const its=[...dd.querySelectorAll('.ddi')];
  let cur=its.findIndex(x=>x.classList.contains('hi'));
  if(e.key==='ArrowDown'){e.preventDefault();cur=Math.min(cur+1,its.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();cur=Math.max(cur-1,0);}
  else if(e.key==='Enter'&&cur>=0){e.preventDefault();its[cur].dispatchEvent(new MouseEvent('mousedown'));return;}
  else if(e.key==='Escape'){closeDD(i);return;}
  its.forEach((x,j)=>x.classList.toggle('hi',j===cur));
}

function switchTab(m){
  mode=m;
  document.getElementById('tab-out').className='tab'+(m==='sign-out'?' active':'');
  document.getElementById('tab-ret').className='tab'+(m==='return'?' active ret':'');
  const b=document.getElementById('sbtn');
  b.textContent=m==='sign-out'?'Submit Sign-Out':'Submit Return';
  b.className=m==='sign-out'?'sbtn':'sbtn ret';
}

function weekPeriod(){
  const d=new Date(),y=d.getFullYear(),s=new Date(y,0,1);
  return y+'-W'+String(Math.ceil(((d-s)/86400000+s.getDay()+1)/7)).padStart(2,'0');
}

async function submit(){
  const emp=document.getElementById('emp-sel').value;
  const job=document.getElementById('job-sel').value;
  if(!emp){toast('Select an employee','err');return;}
  if(!job){toast('Select a job','err');return;}
  const items=[];
  for(let i=1;i<=10;i++){
    const pn=document.getElementById('pn'+i).value.trim();
    const qty=parseFloat(document.getElementById('qty'+i).value);
    if(!pn&&!qty)continue;
    if(!pn){toast('Row '+i+': enter a part number','err');return;}
    if(!qty||qty<1){toast('Row '+i+': enter a quantity','err');return;}
    const ro=document.getElementById('ro'+i).checked;
    const c=pCache['p'+i]||{};
    items.push({part_number:pn,part_description:c.desc||'',unit_cost:c.cost||0,
      quantity:mode==='return'?-Math.abs(qty):qty,reorder:ro});
  }
  if(!items.length){toast('Add at least one part','err');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Submitting…';
  try{
    const sub=await db('/rest/v1/parts_signout_submissions',{
      method:'POST',
      body:JSON.stringify({taken_by:emp,job_label:job,transaction_type:mode,week_period:weekPeriod()}),
      headers:{'Prefer':'return=representation'}
    });
    const id=Array.isArray(sub)?sub[0]?.id:sub?.id;
    if(!id)throw new Error('No ID returned');
    await db('/rest/v1/parts_signout_items',{
      method:'POST',
      body:JSON.stringify(items.map(x=>({...x,submission_id:id}))),
      headers:{'Prefer':'return=minimal'}
    });
    document.getElementById('form-area').style.display='none';
    document.getElementById('success').style.display='flex';
    document.getElementById('ok-title').textContent=mode==='return'?'Parts Returned':'Parts Signed Out';
    document.getElementById('ok-msg').innerHTML=`<strong>${items.length} line item${items.length>1?'s':''}</strong> logged for <strong>${job}</strong><br>`+
      new Date().toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
    startCountdown();
  }catch(e){
    toast('Submission failed: '+e.message,'err');
    btn.disabled=false;
    btn.textContent=mode==='sign-out'?'Submit Sign-Out':'Submit Return';
  }
}

let cdTimer;
function startCountdown(){
  let secs=5;
  const el=document.getElementById('ok-count');
  el.textContent='Resetting in '+secs+'…';
  clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    secs--;
    if(secs<=0){clearInterval(cdTimer);reset();}
    else el.textContent='Resetting in '+secs+'…';
  },1000);
}

function reset(){
  clearInterval(cdTimer);
  document.getElementById('form-area').style.display='block';
  document.getElementById('success').style.display='none';
  document.getElementById('emp-sel').value='';
  document.getElementById('job-sel').value='';
  document.getElementById('new-job').value='';
  document.getElementById('new-emp').value='';
  switchTab('sign-out');buildRows();
}

let tT;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(tT);tT=setTimeout(()=>{t.className='toast';},3500);
}

init();
</script>
</body>
</html>
